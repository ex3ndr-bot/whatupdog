<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Profile | What Up Dog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="profile">
  <div class="site-shell">
    <div class="ambient ambient-one"></div>
    <div class="ambient ambient-two"></div>
    <header class="topbar glass-card page-enter">
      <a class="brand" href="index.html"><span class="brand-mark">🐶</span><span>What Up Dog</span></a>
      <nav class="nav">
        <a class="is-active" href="create-profile.html">Create Profile</a>
        <a href="matches.html">Matches</a>
        <a href="chat.html">Chat</a>
      </nav>
    </header>

    <main class="page-narrow page-enter">
      <section class="page-header fade-up">
        <span class="eyebrow">Founder intake</span>
        <h1>Create your local founder profile</h1>
        <p>Everything stays in localStorage. No account, no backend, no tracking — just a sharper static demo.</p>
      </section>

      <form class="glass-card form-panel fade-up" data-profile-form>
        <div class="form-row form-grid-2">
          <label class="field">
            <span>Name</span>
            <input type="text" name="name" placeholder="Alex Morgan" required>
          </label>
          <label class="field">
            <span>Headline</span>
            <input type="text" name="title" placeholder="AI infrastructure engineer turned founder" required>
          </label>
        </div>

        <div class="form-row form-grid-2">
          <label class="field">
            <span>Location</span>
            <input type="text" name="location" placeholder="San Francisco, CA" required>
          </label>
          <label class="field">
            <span>Avatar emoji</span>
            <input type="text" name="avatar" placeholder="🚀" maxlength="2" required>
          </label>
        </div>

        <div class="form-row">
          <span class="field-label">Core skills</span>
          <div class="chip-grid" data-skill-grid></div>
        </div>

        <div class="form-row form-grid-2">
          <label class="field">
            <span>Interests</span>
            <input type="text" name="interests" placeholder="AI Infrastructure, Fintech, Developer Tools" required>
            <small>Comma-separated startup spaces you want to build in.</small>
          </label>
          <label class="field">
            <span>Working style</span>
            <input type="text" name="personality" placeholder="Fast shipping, direct feedback, customer obsessed" required>
            <small>Comma-separated traits that describe how you operate.</small>
          </label>
        </div>

        <div class="form-row form-grid-2">
          <div>
            <span class="field-label">Primary role</span>
            <div class="radio-grid">
              <label class="radio-card">
                <input type="radio" name="role" value="technical" checked>
                <span>Technical</span>
              </label>
              <label class="radio-card">
                <input type="radio" name="role" value="business">
                <span>Business</span>
              </label>
              <label class="radio-card">
                <input type="radio" name="role" value="hybrid">
                <span>Hybrid</span>
              </label>
            </div>
          </div>
          <label class="field">
            <span>Startup stage</span>
            <select name="stage">
              <option value="idea">Idea</option>
              <option value="mvp" selected>MVP</option>
              <option value="traction">Traction</option>
              <option value="growth">Growth</option>
            </select>
          </label>
        </div>

        <div class="form-row form-grid-2">
          <label class="field">
            <span>Weekly availability</span>
            <select name="availability">
              <option value="nights">Nights & weekends</option>
              <option value="part-time">Part-time</option>
              <option value="full-time" selected>Full-time</option>
            </select>
          </label>
          <label class="field">
            <span>Timezone preference</span>
            <input type="text" name="timezone" placeholder="Pacific Time" required>
          </label>
        </div>

        <div class="form-row">
          <label class="field">
            <span>Bio</span>
            <textarea name="bio" rows="5" placeholder="What have you built, what do you care about, and what kind of co-founder are you looking for?" required></textarea>
          </label>
        </div>

        <div class="form-actions">
          <button class="button" type="submit">Save profile</button>
          <a class="button button-secondary" href="matches.html">Skip to matches</a>
        </div>

        <p class="form-status" data-form-status aria-live="polite"></p>
      </form>
    </main>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
